name: Daily Undervalued Screener

on:
  schedule:
    - cron: '37 10 * * 1,4'  # ~6:37am ET Mondays & Thursdays
  workflow_dispatch:

permissions:
  contents: write   # allow the workflow to commit the updated history file

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Undervalued Screener
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python undervalued_screener.py --email

      - name: Save screening history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screened_history.json
          git diff --staged --quiet || git commit -m "Update screening history [skip ci]"
          git push
