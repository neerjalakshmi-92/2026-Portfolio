name: Stock Watchlist

on:
  schedule:
    - cron: '37 4 * * 1,3'  # 04:37 UTC Mon & Wed; early to absorb GitHub's delay for morning ET delivery
  workflow_dispatch:

permissions:
  contents: write   # allow the workflow to commit the updated history file

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stock Recommender
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python stock_recommender.py --email

      - name: Save watchlist history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist_history.json
          git diff --staged --quiet || git commit -m "Update watchlist history [skip ci]"
          git push
